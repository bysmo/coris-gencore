<!DOCTYPE html>
<html lang="fr">

<head>

<body class="iframe-page" style="background: transparent;">
    <main class="main-content">

                    <h2><i class="fas fa-globe"></i> Destination Internationale</h2>

                    <button class="btn-primary" disabled>Bientôt disponible</button>

            </div>
